name: FPAK calendar scrape

on:
  schedule:
    - cron: "0 6 * * 1"   # weekly, Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write   # push updated fpak-calendar.json to main
  issues: write     # open a heads-up issue on change

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Scrape FPAK
        run: python scrape_fpak.py --report | tee /tmp/report.txt
      - name: Commit change + open issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet -- fpak-calendar.json; then
            echo "No FPAK calendar change; nothing to do."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add fpak-calendar.json
          git commit -m "chore: update FPAK calendar scrape"
          git push
          {
            echo "The weekly FPAK scrape detected calendar changes."
            echo "Fold any real new events into \`motorsport.json\` by hand (curated data stays manual)."
            echo
            echo '```'
            cat /tmp/report.txt
            echo '```'
          } > /tmp/issue.md
          gh issue create \
            --title "FPAK calendar changed (weekly scrape)" \
            --body-file /tmp/issue.md
