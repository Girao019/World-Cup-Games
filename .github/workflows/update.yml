name: Update World Cup calendar

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 5 * * *"   # daily 05:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# so overlapping runs queue instead of cancelling each other's deployment
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build ICS
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: python build_calendar.py
      - name: Build motorsport calendar + page
        run: python build_motorsport.py
      - name: Stage site
        run: |
          mkdir -p _site
          cp worldcup.ics _site/worldcup.ics
          cp index.html _site/index.html
          cp motorsport-pt.ics _site/motorsport-pt.ics
          cp motorsport.html _site/motorsport.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deploy
        uses: actions/deploy-pages@v4
